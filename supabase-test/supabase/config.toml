# Dedicated Supabase instance for the test suite (ADR-019).
#
# Why a second instance: the dev Supabase (project_id =
# "recruitment-platform", port 54321) holds real candidate data
# imported from Teamtailor. Integration + RLS tests run scoped
# deletes but FK cascades and shared RPCs leak cleanup into
# production-looking rows, which already destroyed the dev DB once
# (2026-04-22). This instance is disposable: `pnpm test:db:reset`
# can run at any time without consequence.
#
# Port block is the dev block + 10000 so both instances can run
# simultaneously on the same host. To boot:
#   supabase start --workdir supabase-test
#
# Migrations are a symlink to ../supabase/migrations so the schema
# stays single-sourced.

project_id = "recruitment-platform-test"

[api]
enabled = true
port = 64321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 64322
shadow_port = 64320
# CLI 2.90 only validates `15` here; the actual Postgres image tag
# is picked by the CLI version (→ postgres:17.6.x). Matches dev.
major_version = 15

[db.pooler]
enabled = false
port = 64329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.seed]
# Tests seed their own fixtures; no global seed file for the test
# instance.
enabled = false
sql_paths = []

[realtime]
enabled = true

[studio]
enabled = true
port = 64323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 64324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.external.apple]
enabled = false
client_id = ""
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
redirect_uri = ""
url = ""
skip_nonce_check = false

[auth.third_party.firebase]
enabled = false

[auth.third_party.auth0]
enabled = false

[auth.third_party.aws_cognito]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8093

[analytics]
enabled = true
port = 64327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
