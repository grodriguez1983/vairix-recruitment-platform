name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  APP_ENV: local

jobs:
  # ---------------------------------------------------------
  # Etapa 1: chequeos rápidos (typecheck + lint)
  # Si falla, abortamos las etapas largas.
  # ---------------------------------------------------------
  quick-checks:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Validate DB types regenerados
        run: |
          pnpm supabase:types
          if ! git diff --exit-code src/types/database.ts; then
            echo "::error::src/types/database.ts desactualizado. Corré pnpm supabase:types y commiteá."
            exit 1
          fi

  # ---------------------------------------------------------
  # Etapa 2: tests unitarios
  # ---------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

      - name: Coverage gate (global ≥ 80%)
        run: |
          coverage_line=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          echo "Global line coverage: $coverage_line%"
          if (( $(echo "$coverage_line < 80" | bc -l) )); then
            echo "::error::Coverage $coverage_line% < 80%"
            exit 1
          fi

  # ---------------------------------------------------------
  # Etapa 3: tests de integración contra Supabase local
  # Incluye RLS policies.
  # ---------------------------------------------------------
  integration:
    name: Integration (Supabase local)
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: pnpm/action-setup@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --local --no-backup

      - name: Run integration tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_LOCAL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_LOCAL }}
        run: pnpm test:integration

      - name: Run RLS tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_LOCAL }}
        run: pnpm test:rls

  # ---------------------------------------------------------
  # Etapa 4: E2E (Playwright)
  # Solo smoke set en PRs; full en nightly.
  # ---------------------------------------------------------
  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: pnpm/action-setup@v4
      - uses: supabase/setup-cli@v1

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm dlx playwright install --with-deps chromium

      - name: Start Supabase
        run: supabase start

      - name: Seed test data
        run: pnpm test:e2e:seed

      - name: Build app
        run: pnpm build

      - name: Start app + run E2E
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ---------------------------------------------------------
  # Etapa 5: secrets scan
  # ---------------------------------------------------------
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
